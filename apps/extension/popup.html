<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lemma — Deconstruct</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font:
          13px/1.5 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        margin: 0;
        padding: 14px;
        width: 280px;
        background: #fffaf3;
        color: #1a1a1a;
      }
      h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 6px;
      }
      h1 .acc {
        color: #c4623e;
      }
      p {
        margin: 0 0 10px;
        color: #4a4a4a;
      }
      label.toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        background: #fff;
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 4px;
        cursor: pointer;
        margin-bottom: 10px;
        font-weight: 500;
      }
      .meta {
        font-size: 12px;
        color: #888;
      }
      .meta a {
        color: #c4623e;
        text-decoration: none;
      }
      .meta a:hover {
        text-decoration: underline;
      }
      .count {
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <h1>Lemma <span class="acc">— Deconstruct</span></h1>
    <p>
      Underlines math, finance, and ML terms on any web page. Click a term for the one-line and a
      deep link.
    </p>
    <label class="toggle">
      <input type="checkbox" id="enabled" />
      <span>Highlight terms</span>
    </label>
    <p class="meta">
      <span class="count" id="count">…</span> terms in corpus. Reload pages after toggling.
    </p>
    <p class="meta">
      <a href="https://lemma.wiki" target="_blank" rel="noopener noreferrer">lemma.wiki ↗</a>
    </p>
    <script src="popup.js"></script>
  </body>
</html>
