# https://lefthook.dev/configuration/
#
# Format with oxfmt, then lint with oxlint. Both run on pre-commit against the
# files staged for the commit; auto-fixes are re-staged via stage_fixed.
# Unfixable lint errors abort the commit.

pre-commit:
  parallel: true
  jobs:
    - name: fmt
      # oxfmt's markdown formatter mangles JSX in .mdx (rewrites underscores
      # inside <Formula> as italic emphasis, breaking content). Per-locale
      # MDX content is excluded; .md files (glossary) are still formatted.
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,mts,cts,json,jsonc,webmanifest,md,yml,yaml,css}"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true

    - name: lint
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,mts,cts}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: typecheck
      run: pnpm --filter lemma-web exec astro check
