    <circle cx="50" cy="50" r="26" />
    <line x1="10" y1="76" x2="90" y2="76" />
  </g>

  <!-- Wordmark -->
  <text x="600" y="380" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="100" font-weight="500" letter-spacing="-0.02em" fill="#14110d">Lemma</text>

